<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>jogo</title>

<body class="color10">
    <main>
        <div class="info-jogo color02">

            <img src="/teams/img/obra_dinn.jpg" class="img-jogo">

            <div style="padding: 2%;">

                <div class="desc-jogo">
                    <p>Desaparecido no Mar, 1803 O BOM NAVIO “OBRA DINN”</p>
                </div>
                <div class="flex center" style="margin-bottom: 2%;">
                    <button class="botao_enviar">Comprar</button>
                    <button class="botao_apagar">+ Carrinho</button>
                </div>
                <div class="flex space">
                    <p class="preco">R$59,99</p>

                    <div class="classificacao color01">
                        <p>Classificação Indicativa:</p>

                            </div>
                        </div>
