<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>
<body class="color10">
    <!-- 
    Página de cadastro de usuário contendo: 
    NOME, LOGIN, SENHA, CPF, DATA de NASCIMENTO e E-MAIL; 
    -->
    <main>
        <form action="#" class="cadastro">
            <h2>Cadastro de Usúario</h2>

            <label for="#">Nome:</label>
            <input type="text" min="1" max="50" placeholder="Digite seu Nome aqui">

            <label for="#">Login:</label>
            <input type="text" min="1" max="50" placeholder="Digite seu Login aqui">

            <label for="#">Senha:</label>
            <input type="text" min="1" max="50" placeholder="Digite sua Senha aqui">

            <label for="#">CPF:</label>
            <input type="number" max="11" placeholder="Digite seu CPF aqui">

            <label for="#">Data de Nascimento:</label>
            <input type="date" placeholder="Digite sua Data de Nascimento aqui">

            <label for="#">E-Mail:</label>
            <input type="email" min="1" max="100" placeholder="Digite seu E-Mail aqui">

            <div class="center">
                <button type="submit" class="botao_enviar">Enviar</button>
                <button type="reset"  class="botao_apagar">Apagar</button>
            </div>
        </form>
    </main>
</body>
</html>
