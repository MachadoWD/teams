<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>
<body class="color10">
    <header class="header">

        <div class="logo">
            <img id="logo" src="img/logo.png" alt="Logo do Teams">
            <nav class="nav1">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Comunidade</a></li>
                    <li><a href="#">Perfil</a></li>
                </ul>   
            </nav>
            <a href="carrinho.html"><img src="img/carrinho.png" alt="Carrinho de Compras" id="carrinho"></a>
        </div>

        <div class="search-bar">
            <nav class="cat">
                <ul class="nav-links2">
                    <li class="dropdown">
                        Categorias
                        <ul class="submenu">
                            <li>Investigação</li>
                            <li>Shooter</li>
                            <li>RPG</li>
                            <li>Indie</li>
                            <li>Roguelike</li>
                        </ul>
                    </li>
                    <li>Explorar</li>
                    <li>Recomendações</li>
                    <li>Wishlist</li>
                </ul>
            </nav>

            <form>
                <input type="text" placeholder="Digite sua busca...">
                <button type="submit">Pesquisar</button>
            </form>
        </div>

    </header>
    <main>
        <form action="#" class="cadastro">
            <h2>Cadastro de Usúario</h2>

            <label for="nome">Nome:</label>
            <input id="nome" type="text" placeholder="Digite seu Nome">

            <label for="login">Login:</label>
            <input id="login" type="text" placeholder="Digite seu Login">

            <label for="senha">Senha:</label>
            <input id="senha" type="text" placeholder="Digite sua Senha">

            <label for="cpf">CPF:</label>
            <input id="cpf" type="number" max="11" placeholder="Digite seu CPF">

            <label for="data">Data de Nascimento:</label>
            <input id="data" type="date">

            <label for="email">E-Mail:</label>
            <input id="email" type="email" placeholder="Digite seu E-Mail">

            <div class="center">
                <button type="submit" class="botao_enviar">Enviar</button>
                <button type="reset"  class="botao_apagar">Apagar</button>
                <a href="login.html">Já possui uma conta? <u>Faça o login</u></a>
            </div>
        </form>
    </main>
    <footer>
        <p class="copy">&copy; 2026 Teams. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
