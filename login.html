<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body class="color10">
    <header class="header">
        <div class="logo" style="box-shadow: 0 0 10px 2px #27002b; margin-bottom: 10vh;">
            <img id="logo" src="img/logo.png" alt="Logo do Teams" width="100vw">
            <nav class="nav1">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Comunidade</a></li>
                    <li><a href="#">Perfil</a></li>
                </ul>   
            </nav>
            <a href="carrinho.html"><img src="img/carrinho.png" alt="Carrinho de Compras" id="carrinho" width="10vw"></a>
    </header>
    <main class="main-log">
        <form action="#" class="login">
            <div class="center">
                <h2>Login</h2>
            </div>

            <label for="#">Login:</label>
            <input type="text" min="1" max="50" placeholder="Digite seu Login">

            <label for="#">Senha:</label>
            <input type="text" min="1" max="50" placeholder="Digite sua Senha">

            <div class="center ">
                <button type="submit" class="botao_enviar">Enviar</button>
                <button type="reset" class="botao_apagar">Apagar</button>
                <a href="cadastro.html">Ainda não fez cadastro em nosso site? <u>Cadastre-se</u></a>
            </div>
        </form>
    </main>
    <footer>
        <p class="copy">&copy; 2026 Teams. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
