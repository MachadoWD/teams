<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams</title>
</head>
<body>
    <!--loja virtual de jogos digitais -->
    <header class="header">

        <div class="logo">
            <img id="logo" src="img/logo.png" alt="Logo do Teams" width="100vw">
            <nav class="nav1">
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Comunidade</a></li>
                    <li><a href="#">Perfil</a></li>
                </ul>   
            </nav>
            <img src="img/carrinho.png" alt="Carrinho de Compras" id="carrinho" width="10vw">
        </div>

        <div class="search-bar">
            <nav class="cat">
                <ul class="nav-links2">
                    <li class="dropdown">
                        Categorias
                        <ul class="submenu">
                            <li>Investigação</li>
                            <li>Shooter</li>
                            <li>RPG</li>
                            <li>Indie</li>
                            <li>Roguelike</li>
                        </ul>
                    </li>
                    <li>Explorar</li>
                    <li>Recomendações</li>
                    <li>Seções Especiais</li>
                </ul>
            </nav>

            <form>
                <input type="text" placeholder="Digite sua busca...">
                <button type="submit">Pesquisar</button>
            </form>
        </div>

    </header>
    <main>
        <div class="carrinho">
            <h1>Carrinho</h1>
            <div class="c-jogos">
                <div class="c-jogo">
                    <img class="c-img-jogo" src="img/needy.jpg" alt="Imagem de Needy Girl Overdose">
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p class="copy">&copy; 2026 Teams. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
