
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams</title>
</head>
<body class="color10">
    <!--loja virtual de jogos digitais -->
    <header class="header">

        <div class="logo">
            <img id="logo" src="img/logo.png" alt="Logo do Teams">
            <nav class="nav1">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Comunidade</a></li>
                    <li><a href="#">Perfil</a></li>
                </ul>   
            </nav>
            <a href="carrinho.html"><img src="img/carrinho.png" alt="Carrinho de Compras" id="carrinho"></a>
        </div>

        <div class="search-bar">
            <nav class="cat">
                <ul class="nav-links2">
                    <li class="dropdown">
                        Categorias
                        <ul class="submenu">
                            <li>Investigação</li>
                            <li>Shooter</li>
                            <li>RPG</li>
                            <li>Indie</li>
                            <li>Roguelike</li>
                        </ul>
                    </li>
                    <li>Explorar</li>
                    <li>Recomendações</li>
                    <li>Wishlist</li>
                </ul>
            </nav>

            <form>
                <input type="text" placeholder="Digite sua busca...">
                <button type="submit">Pesquisar</button>
            </form>
        </div>

    </header>
    <main>
        <div class="main-pagamento">
            <h1>Escolha a forma de pagamento</h1>
            <div class="formas-pag">
                <div class="credito">
                    <h2>Cartão de Crédito</h2>
                    <div>
                        <button class="botao_enviar">Visa</button>
                        <button class="botao_apagar">MasterCard</button>
                    </div>
                </div>
                <div class="debito">
                    <h2>Cartão de Débito</h2>
                    <div>
                        <button class="botao_enviar">Débito</button>
                    </div>
                </div>
                <div class="debito pix">
                    <h2>PIX</h2>
                    <div>
                        <button class="botao_enviar b-pix">PIX</button>
                    </div>
                </div>
                <div class="debito boleto">
                    <h2>Boleto</h2>
                    <div>
                        <button class="botao_enviar b-boleto">Boleto</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p class="copy">&copy; 2026 Teams. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
