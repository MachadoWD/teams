<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body class="color10">
    <main>
        <form action="#" class="login">
            <div class="center">
                <h2>Login</h2>
            </div>

            <label for="#">Login:</label>
            <input type="text" min="1" max="50" placeholder="Digite seu Login aqui">

            <label for="#">Senha:</label>
            <input type="text" min="1" max="50" placeholder="Digite sua Senha aqui">

            <div class="center ">
                <button type="submit" class="botao_enviar">Enviar</button>
                <button type="reset" class="botao_apagar">Apagar</button>
                <a href="cadastro.html">Ainda não fez cadastro em nosso site?</a>
            </div>
        </form>
    </main>
</body>
</html>
